<div
     class="position-relative w-100 h-100 carousel-wrapper">
    <!-- Render active image -->
    <div
         class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center">
        <!-- Single Image Display -->
        <img
             class="w-100 h-100 fade-in carousel-img"
             src="(($currentImage))"
             alt="Producto" />
    </div>

    <!-- Controls (Only visible if > 1 image) -->
    <div
         fw-if="$hasMultiple"
         class="position-absolute w-100 h-100 top-0 start-0 d-flex justify-content-between align-items-center p-2 z-index-2">
        <button
                type="button"
                aria-label="Anterior"
                class="btn btn-sm btn-light rounded-circle shadow-sm opacity-75 control-btn"
                onclick="((this)).prev()">
            <i class="bi bi-chevron-left"></i>
        </button>
        <button
                type="button"
                aria-label="Siguiente"
                class="btn btn-sm btn-light rounded-circle shadow-sm opacity-75 control-btn"
                onclick="((this)).next()">
            <i class="bi bi-chevron-right"></i>
        </button>
    </div>

    <!-- Dots -->
    <div
         fw-if="$hasMultiple"
         class="position-absolute bottom-0 start-0 w-100 d-flex justify-content-center gap-2 pb-2 z-index-2">
        <div fw-each="dot in dots">
            <div
                 fw-if="dot.isActive"
                 class="carousel-dot carousel-dot-active"></div>
            <div
                 fw-if="!dot.isActive"
                 onclick="((this)).goTo(((dot.index)))"
                 class="carousel-dot carousel-dot-inactive cursor-pointer"></div>
        </div>
    </div>
</div>
