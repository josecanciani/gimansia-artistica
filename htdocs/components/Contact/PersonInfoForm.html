<form novalidate>
    <div class="row g-3 text-start">
        <div class="col-12 col-md-6">
            <label class="form-label fw-medium text-dark">((sedeLabel))</label>
            <select name="sede" value="((sede))" oninput="((this)).sync(event)" class="form-select border-0 shadow-sm" fw-attr-required="sedeRequired">
                <option value="">Seleccionar sede</option>
                <option value="Capital">Capital</option>
                <option value="Tigre">Tigre</option>
            </select>
            <div class="invalid-feedback">Por favor seleccioná una sede.</div>
        </div>
        <div class="col-12 col-md-6">
            <label class="form-label fw-medium text-dark">((modalidadLabel))</label>
            <select name="modalidad" value="((modalidad))" oninput="((this)).sync(event)" class="form-select border-0 shadow-sm" fw-attr-required="modalidadRequired">
                <option value="">Seleccionar modalidad</option>
                <option value="Escuela">Escuela</option>
                <option value="Equipo">Equipo</option>
            </select>
            <div class="invalid-feedback">Por favor seleccioná una modalidad.</div>
        </div>
        <div class="col-12">
            <label class="form-label fw-medium text-dark">((nombreLabel))</label>
            <input type="text" name="nombre" value="((nombre))" oninput="((this)).sync(event)" class="form-control border-0 shadow-sm" placeholder="Ej: Ana Pérez" fw-attr-required="nombreRequired" />
            <div class="invalid-feedback">Ingresá el nombre y apellido.</div>
        </div>
        <div class="col-12">
            <label class="form-label fw-medium text-dark">((grupoLabel))</label>
            <input type="text" name="grupo" value="((grupo))" oninput="((this)).sync(event)" class="form-control border-0 shadow-sm" placeholder="Ej: Pre-equipo" fw-attr-required="grupoRequired" />
            <div class="invalid-feedback">Ingresá el grupo de la gimnasta.</div>
        </div>
        <div class="col-12 col-md-6">
            <label class="form-label fw-medium text-dark">((emailLabel))</label>
            <input type="email" name="email" value="((email))" oninput="((this)).sync(event)" class="form-control border-0 shadow-sm" placeholder="ejemplo@mail.com" fw-attr-required="emailRequired" />
            <div class="invalid-feedback">Ingresá un mail válido.</div>
        </div>
        <div class="col-12 col-md-6">
            <label class="form-label fw-medium text-dark">((celularLabel))</label>
            <div class="input-group shadow-sm rounded">
                <span class="input-group-text border-0 bg-light">+54</span>
                <input type="tel" name="celular" value="((celular))" oninput="((this)).sync(event)" class="form-control border-0" placeholder="11 1234 5678" pattern="[0-9]{2,4}[0-9]{6,8}" title="Ingresá un número válido sin guiones ni espacios (ej: 1122334455)" fw-attr-required="celularRequired" />
                <div class="invalid-feedback">Ingresá un celular válido sin espacios.</div>
            </div>
            <div class="form-text text-muted" style="font-size: 0.75rem;">Ingresá el código de área y número sin espacios (ej: 1122334455).</div>
        </div>
        <div class="col-12 mt-2">
            <label class="form-label fw-medium text-dark">((messageLabel))</label>
            <textarea name="mensaje" oninput="((this)).sync(event)" class="form-control border-0 shadow-sm" rows="4" placeholder="((messagePlaceholder))">((mensaje))</textarea>
            <div fw-if="messageRequired" class="invalid-feedback">Este campo es obligatorio.</div>
        </div>
    </div>
</form>
