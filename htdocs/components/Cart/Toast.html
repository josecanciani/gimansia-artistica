<div fw-if="isVisible" class="position-fixed shadow-lg rounded-4 p-3 bg-white border border-primary overflow-hidden toast-notification">
    <div class="d-flex align-items-center gap-3 position-relative z-1">
        <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center toast-icon-circle">
            <i class="bi bi-check-lg text-primary fs-4"></i>
        </div>
        <div>
            <span class="fw-bold text-dark d-block">Carrito actualizado</span>
            <span class="text-secondary small fw-medium">Total parcial: $((formattedTotal))</span>
        </div>
    </div>
    <!-- Progress bar -->
    <div class="position-absolute bottom-0 start-0 h-100 bg-primary opacity-25 toast-progress-bar"></div>
</div>
