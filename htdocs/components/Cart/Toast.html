<div fw-if="isVisible" class="position-fixed shadow-lg rounded-4 p-3 bg-white border border-primary overflow-hidden" style="top: 85px; right: 20px; min-width: 250px; z-index: 2000; animation: slideInRight 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;">
    <div class="d-flex align-items-center gap-3 position-relative z-1">
        <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px; flex-shrink: 0;">
            <i class="bi bi-check-lg text-primary fs-4"></i>
        </div>
        <div>
            <span class="fw-bold text-dark d-block">Carrito actualizado</span>
            <span class="text-secondary small fw-medium">Total parcial: $((formattedTotal))</span>
        </div>
    </div>
    <!-- Progress bar -->
    <div class="position-absolute bottom-0 start-0 h-100 bg-primary opacity-25" style="width: 100%; height: 4px !important; animation: progressShrink 3s linear forwards;"></div>
</div>

<style>
    @keyframes slideInRight {
        0% {
            transform: translateX(120%);
            opacity: 0;
        }

        100% {
            transform: translateX(0);
            opacity: 1;
        }
    }

    @keyframes progressShrink {
        0% {
            width: 100%;
            border-radius: 0 0 1rem 1rem;
        }

        100% {
            width: 0%;
            border-radius: 0 0 0 1rem;
        }
    }

</style>
