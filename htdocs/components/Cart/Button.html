<!-- Active Button -->
<button
    fw-if="$hasItems"
    type="button"
    aria-label="Ver carrito"
    class="btn btn-primary rounded-pill px-3 py-2 shadow-sm d-flex align-items-center gap-2 position-relative"
    onclick="((this)).triggerClick()"
    style="transition: all 0.2s"
>
    <span class="position-relative">
        <i class="bi bi-cart-fill fs-5"></i>
        <span
            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-md-none"
            style="font-size: 0.6rem; padding: 0.25em 0.4em"
            >(($totalItemsCount))</span
        >
    </span>
    <span
        class="d-none d-md-flex flex-column text-start"
        style="line-height: 1"
    >
        <span class="fs-6 fw-bold">$(($formattedTotal))</span>
        <small style="font-size: 0.7rem; font-weight: 500" class="text-white-50"
            >(($totalItemsCount)) prendas</small
        >
    </span>
</button>

<!-- Empty state (muted gray to not look clickable) -->
<button
    fw-if="!$hasItems"
    type="button"
    aria-label="Carrito vacío"
    class="btn btn-light bg-light rounded-pill px-3 py-2 shadow-sm d-flex align-items-center gap-2"
    style="opacity: 0.8"
    disabled
>
    <i class="bi bi-cart3 fs-5 text-secondary"></i>
    <span
        class="d-none d-md-flex flex-column text-start"
        style="line-height: 1"
    >
        <span class="fs-6 fw-bold text-secondary">$0</span>
        <small
            style="font-size: 0.7rem; font-weight: 500"
            class="text-secondary opacity-75"
            >Vacío</small
        >
    </span>
</button>
