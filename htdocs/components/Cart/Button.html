<!-- Active Button -->
<button
        fw-if="$hasItems"
        type="button"
        aria-label="Ver carrito"
        class="btn btn-primary rounded-pill px-3 py-2 shadow-sm d-flex align-items-center gap-2 position-relative cart-btn-active"
        onclick="((this)).triggerClick()">
    <span class="position-relative">
        <i class="bi bi-cart-fill fs-5"></i>
        <span
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-md-none cart-badge-count">(($totalItemsCount))</span>
    </span>
    <span
          class="d-none d-md-flex flex-column text-start cart-btn-details">
        <span class="fs-6 fw-bold">$(($formattedTotal))</span>
        <small class="text-white-50 cart-btn-label">(($totalItemsCount)) prendas</small>
    </span>
</button>

<!-- Empty state (muted gray to not look clickable) -->
<button
        fw-if="!$hasItems"
        type="button"
        aria-label="Carrito vacío"
        class="btn btn-light bg-light rounded-pill px-3 py-2 shadow-sm d-flex align-items-center gap-2 cart-btn-empty"
        disabled>
    <i class="bi bi-cart3 fs-5 text-secondary"></i>
    <span
          class="d-none d-md-flex flex-column text-start cart-btn-details">
        <span class="fs-6 fw-bold text-secondary">$0</span>
        <small
               class="text-secondary opacity-75 cart-btn-label">Vacío</small>
    </span>
</button>
