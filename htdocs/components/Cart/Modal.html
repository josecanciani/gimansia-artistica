<div
     fw-if="isOpen"
     class="modal fade show d-block cart-modal-overlay"
     tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content border-0 shadow-lg cart-modal-content">
            <div
                 class="modal-header bg-primary text-white border-bottom-0 pb-2 pt-3 align-items-start">
                <div>
                    <h6 class="modal-title fw-bold mb-0">
                        <i class="bi bi-bag-check-fill me-2"></i>Tu pedido
                    </h6>
                    <small
                           class="text-white-50 lh-1 d-block mt-1 cart-modal-small-text">Resumen de prendas seleccionadas</small>
                </div>
                <button
                        type="button"
                        class="btn-close btn-close-white"
                        aria-label="Cerrar"
                        onclick="((this)).close()"></button>
            </div>

            <div
                 class="modal-body p-3 overflow-x-hidden custom-scrollbar cart-modal-body-scroll">
                <div
                     fw-each="prod in groupedItems"
                     class="mb-3 pb-2 border-bottom border-light">
                    <div
                         class="fw-bold text-dark mb-2 cart-modal-product-title">
                        ((prod.title))
                    </div>
                    <div
                         fw-each="item in prod.selections"
                         class="d-flex justify-content-between align-items-center mb-1 px-0">
                        <span class="text-secondary cart-modal-item-text">
                            <i
                               class="bi bi-arrow-return-right me-1 opacity-50"></i>
                            ((item.group))
                            <span class="fw-bold text-dark">— ((item.option))</span>
                            <span
                                  fw-if="item.countBadge"
                                  class="badge bg-secondary opacity-75 ms-1 cart-modal-count-badge">((item.countBadge))</span>
                        </span>
                        <span
                              class="fw-medium text-dark cart-modal-item-text">$ ((item.totalLinePrice))</span>
                    </div>
                </div>
            </div>

            <div
                 class="modal-footer bg-light border-top-0 d-flex flex-column align-items-stretch px-3 py-3 gap-2">
                <div
                     class="d-flex justify-content-between align-items-end w-100 mb-1">
                    <span class="fw-bold text-muted small">Total a abonar:</span>
                    <span class="fw-bold text-primary h5 mb-0">$ (($formattedTotal))</span>
                </div>
                <button
                        type="button"
                        class="btn btn-primary fw-bold px-3 rounded-pill shadow-sm py-2 fs-6 d-flex align-items-center justify-content-center gap-2"
                        onclick="((this)).checkout()">
                    Enviar reserva por Email <i class="bi bi-envelope-at"></i>
                </button>
                <div class="text-center mt-0">
                    <small class="text-muted cart-modal-small-text">¿Sin e-mail?
                        <a
                           href="#"
                           onclick="
                                ((this)).checkoutWhatsApp();
                                return false;
                            "
                           class="text-success fw-bold text-decoration-none">Reserva por WhatsApp
                            <i class="bi bi-whatsapp"></i></a></small>
                </div>
                <div
                     class="alert alert-warning border-0 rounded-3 p-2 mt-1 mb-0 w-100 text-center alert-highlight">
                    <small
                           class="text-dark d-block lh-sm cart-modal-small-text"><strong>📌 PAGO EN EFECTIVO:</strong> Te enviaremos un
                        email para coordinarlo.</small>
                </div>
            </div>
        </div>
    </div>
</div>
