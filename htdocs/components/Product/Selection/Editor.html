<div class="modal fade show d-block" style="background: rgba(0,0,0,0.5); z-index: 1060 !important;" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
        <div class="modal-content border-0 shadow-lg" style="max-height: 90vh;">
            <div class="modal-header bg-light border-bottom-0 pb-3 align-items-start">
                <div>
                    <h5 class="modal-title fw-bold text-primary mb-1">Seleccioná tus talles</h5>
                    <small class="text-secondary d-block lh-sm">Elegí la cantidad para cada prenda deseada</small>
                </div>
                <!-- Call directly to the component close method -->
                <button type="button" class="btn-close" aria-label="Cerrar" onclick="((this)).close()"></button>
            </div>

            <div class="modal-body px-4 py-3 overflow-x-hidden">
                <div class="row">
                    <!-- Configura el mapping side-by-side dinamicamente para desktop -->
                    <div fw-each="g in draftOptions" class="col-12 ((colClass)) mb-3">
                        <h6
                            class="fw-bold text-dark border-bottom pb-2 mb-3 d-flex justify-content-between align-items-center">
                            <span>((g.label))</span>
                            <span class="badge bg-primary bg-opacity-10 text-primary fs-6">$ ((g.priceFormatted))</span>
                        </h6>

                        <div fw-each="opt in g.options" class="d-flex justify-content-between align-items-center mb-3">
                            <span class="text-dark fw-medium fs-5 ps-1">((opt.label))</span>

                            <div class="d-flex align-items-center justify-content-between gap-1 bg-light rounded-pill px-2 py-1 shadow-sm border border-secondary border-opacity-25"
                                 style="min-width: 125px;">
                                <button type="button"
                                        class="btn btn-sm text-danger p-0 border-0 fs-3 lh-1 d-flex align-items-center justify-content-center"
                                        style="width:36px; height:36px; touch-action: manipulation;" data-payload="((opt.payload))"
                                        onclick="((this)).handleDecrement(event)" aria-label="Restar">
                                    <i class="bi bi-dash fw-bold"></i>
                                </button>
                                <span class="fw-bold text-center user-select-none fs-5 w-100">((opt.count))</span>
                                <button type="button"
                                        class="btn btn-sm text-success p-0 border-0 fs-3 lh-1 d-flex align-items-center justify-content-center"
                                        style="width:36px; height:36px; touch-action: manipulation;" data-payload="((opt.payload))"
                                        onclick="((this)).handleIncrement(event)" aria-label="Sumar">
                                    <i class="bi bi-plus fw-bold"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div
                 class="modal-footer bg-light border-top-0 d-flex flex-wrap justify-content-between align-items-center px-4 py-3 gap-2">
                <button fw-if="$draftTotalPrice" type="button"
                        class="btn btn-outline-danger fw-medium rounded-pill border-0" onclick="((this)).clear()">
                    <i class="bi bi-trash3 me-1"></i> Vaciar
                </button>
                <div fw-if="!$draftTotalAmount" style="width: 80px;"></div>

                <div class="d-flex align-items-center gap-3">
                    <div class="text-end me-1 d-none d-sm-block">
                        <span class="fw-bold text-muted small d-block">Subtotal:</span>
                        <span class="fw-bold text-primary h5 mb-0">$ (($formattedDraftTotal))</span>
                    </div>
                    <button type="button"
                            class="btn btn-primary fw-bold px-4 rounded-pill shadow-sm py-2 fs-6 text-nowrap"
                            onclick="((this)).accept()">
                        <span class="d-sm-none fs-5 me-2">$ (($formattedDraftTotal))</span><span>Confirmar</span> <i
                           class="bi bi-check-lg ms-1"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
