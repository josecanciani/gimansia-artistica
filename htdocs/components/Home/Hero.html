<section class="min-vh-100 d-flex align-items-center position-relative overflow-hidden hero-section">
    <!-- Abstract Background Shapes -->
    <div class="position-absolute rounded-circle hero-bg-shape-1"></div>
    <div class="position-absolute rounded-circle hero-bg-shape-2"></div>

    <div class="container position-relative z-index-1">
        <div class="row align-items-center mb-5">
            <div class="col-lg-6 text-center text-lg-start mb-5 mb-lg-0 mt-5 pt-lg-0">
                <span class="badge rounded-pill bg-white text-primary px-3 py-2 border shadow-sm mb-4 animate-slide-up hero-badge">
                    Temporada 2026/27 <i class="bi bi-arrow-right ms-1"></i>
                </span>
                <h1 class="display-3 fw-bold mb-4 animate-slide-up delay-100">
                    Pasión por la <br />
                    <span class="text-gradient">Gimnasia Artística</span>
                </h1>
                <p class="lead text-secondary mb-5 animate-slide-up delay-200 hero-description">
                    Desarrolla fuerza, flexibilidad y disciplina en las
                    mejores instalaciones del país. Únete al equipo del Club
                    Hacoaj.
                </p>
                <div class="d-flex flex-column flex-sm-row justify-content-center justify-content-lg-start gap-3 animate-slide-up delay-200">
                    <button type="button" onclick="((this)).scrollToCatalog()" class="btn btn-primary btn-lg">
                        Ver Catálogo
                    </button>
                    <button type="button" class="btn btn-outline-primary btn-lg bg-white">
                        Conocer más
                    </button>
                </div>
            </div>

            <div class="col-lg-6 position-relative animate-fade-in delay-200">
                <!-- Feature Image / Glass Card -->
                <div class="glass-panel p-4 p-md-5 text-center position-relative h-100 d-flex flex-column justify-content-center overflow-hidden">
                    <div class="position-absolute top-0 start-0 w-100 h-100 bg-white hero-glass-overlay"></div>

                    <!-- Mini collage simulation with actual product images -->
                    <div class="position-relative z-index-1 h-100 d-flex align-items-center justify-content-center">
                        <img src="./images/products/product-6.png" alt="Producto 6" class="rounded-4 shadow hero-img-1" />
                        <img src="./images/products/product-8.png" alt="Producto 8" class="rounded-4 shadow delay-200 hero-img-2" />
                    </div>
                    <h4 class="fw-bold mt-4 position-relative z-index-1 hero-collection-title">
                        Colección 2026
                    </h4>
                </div>
            </div>
        </div>
    </div>
</section>
